<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ömer FC | GLB 3D Asset Update (V6) ⚽</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #050510; font-family: 'Segoe UI', sans-serif; user-select: none; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }

        #scoreboard { display: flex; background: rgba(0, 0, 0, 0.9); border: 2px solid #555; border-radius: 12px; overflow: hidden; font-weight: 900; font-size: 28px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .team-tag { padding: 10px 25px; color: white; display: flex; align-items: center; letter-spacing: 2px;}
        .t-home { background: #001A6E; color: #f1c40f; } 
        .t-away { background: #A50044; color: #fff; } 
        .score-box { background: #fff; color: #000; padding: 10px 25px; font-size: 36px; display: flex; gap: 15px;}

        #bottom-panel { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        .bar-container { width: 400px; height: 25px; background: rgba(0,0,0,0.8); border: 2px solid #fff; border-radius: 12px; overflow: hidden; display: flex; align-items: center; position: relative; }
        .bar-label { position: absolute; left: 15px; color: white; font-size: 14px; font-weight: 900; z-index: 2; text-shadow: 1px 1px 2px black;}
        #power-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c); transition: width 0.05s; }
        #stamina-fill { width: 100%; height: 100%; background: #3b82f6; transition: width 0.1s; }

        #controls-info { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 10px; font-size: 14px; font-weight: bold; line-height: 1.8; border: 1px solid #555; }
        .key { background: #f1c40f; color: black; padding: 3px 8px; border-radius: 5px; margin-right: 5px; font-weight: 900;}

        #center-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.1); font-size: 90px; font-weight: 900; color: #00e676; text-shadow: 0 10px 30px rgba(0,0,0,0.9); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; line-height: 1;}
        .show-msg { opacity: 1 !important; transform: translate(-50%, -50%) scale(1) !important; }

        #aim-warning { position: absolute; top: 75%; left: 50%; transform: translate(-50%, -50%); font-size: 13px; font-weight: bold; color: #fff; background: rgba(239, 68, 68, 0.8); padding: 6px 15px; border-radius: 20px; border: 1px solid #fca5a5; display: none; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); letter-spacing: 1px; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

<div id="game-canvas"></div>

<div id="ui-layer">
    <div id="scoreboard">
        <div class="team-tag t-home">ÖMER</div>
        <div class="score-box"><span id="s-home">0</span>-<span id="s-away">0</span></div>
        <div class="team-tag t-away">YZ BOT</div>
    </div>

    <div id="center-msg">GOOOOL!<br><span style="font-size: 40px; color: white;">Tam Doksana!</span></div>
    <div id="aim-warning">🎯 HEDEF SEÇİLİYOR...</div>

    <div id="controls-info">
        <span class="key">WASD</span> Hareket Et<br>
        <span class="key" style="background:#ef4444; color:white;">Space</span> Şut / Hamle<br>
        <span class="key">E</span> Hızlı Pas<br>
        <span class="key">Shift</span> Depar<br>
        <span class="key">F</span> Yakın Dribbling
    </div>

    <div id="bottom-panel">
        <div class="bar-container">
            <span class="bar-label">ŞUT GÜCÜ & NİŞAN</span>
            <div id="power-fill"></div>
        </div>
        <div class="bar-container">
            <span class="bar-label">KONDİSYON (STAMINA)</span>
            <div id="stamina-fill"></div>
        </div>
    </div>
</div>

<script>
    let scoreHome = 0; let scoreAway = 0;
    let gameState = 'playing'; 
    let shootPower = 0; let isAiming = false; let stamina = 100;

    const container = document.getElementById('game-canvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a); 
    scene.fog = new THREE.Fog(0x0f172a, 30, 100);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 18, 30);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(20, 40, 20); dirLight.castShadow = true;
    scene.add(dirLight);

    const pitchW = 55; const pitchL = 80;
    const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#14532d'; ctx.fillRect(0, 0, 1024, 1024);
    ctx.fillStyle = '#166534'; for(let i=0; i<1024; i+=128) ctx.fillRect(0, i, 1024, 64); 
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 6;
    ctx.strokeRect(20, 20, 984, 984); 
    ctx.beginPath(); ctx.moveTo(20, 512); ctx.lineTo(1004, 512); ctx.stroke(); 
    ctx.beginPath(); ctx.arc(512, 512, 80, 0, Math.PI*2); ctx.stroke(); 
    ctx.strokeRect(262, 20, 500, 160); ctx.strokeRect(262, 844, 500, 160); 

    const pitchTex = new THREE.CanvasTexture(canvas);
    const pitch = new THREE.Mesh(new THREE.PlaneGeometry(pitchW, pitchL), new THREE.MeshStandardMaterial({ map: pitchTex, roughness: 0.9 }));
    pitch.rotation.x = -Math.PI / 2; pitch.receiveShadow = true; scene.add(pitch);

    // --- ÖZEL GLB KALE YÜKLEYİCİSİ (YENİ) ---
    const gltfLoader = new THREE.GLTFLoader();
    const goalW = 12, goalH = 4.5, goalD = 3; 

    function createGoal(zPos, isRotate) {
        const group = new THREE.Group();

        // 1. KENDİ SOCCER GOAL.GLB MODELİNİ YÜKLE
        gltfLoader.load(
            'Soccer goal.glb', // Klasöründeki dosyanın birebir adı olmalı
            function (gltf) {
                const goalModel = gltf.scene;
                
                // NOT: İndirdiğin GLB modelinin boyutu farklı olabilir. 
                // Eğer kale çok küçük veya devasa olursa buradaki (1,1,1) sayılarıyla oyna. (Örn: 2,2,2 veya 0.5,0.5,0.5)
                goalModel.scale.set(1.5, 1.5, 1.5); 
                
                // Modelin gölge atmasını sağla
                goalModel.traverse(function (child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                // Modeli gruba ekle
                group.add(goalModel);
            },
            undefined,
            function (error) {
                console.error("Kanka GLB yüklenemedi! Dosya adını ve Live Server'ı kontrol et.", error);
                // Eğer model yüklenmezse oyun çökmesin diye eski beyaz direkleri fallback (yedek) olarak çiziyoruz:
                const postMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, goalH), postMat); p1.position.set(-goalW/2, goalH/2, 0);
                const p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, goalH), postMat); p2.position.set(goalW/2, goalH/2, 0);
                const cross = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, goalW+0.3), postMat); cross.rotation.z = Math.PI/2; cross.position.set(0, goalH, 0);
                group.add(p1, p2, cross);
            }
        );

        // 2. DİNAMİK FİLE (GLB'nin arkasına şeffaf fiziksel file yerleştiriyoruz)
        const netGeo = new THREE.PlaneGeometry(goalW, goalH, 20, 10);
        const net = new THREE.Mesh(netGeo, new THREE.MeshBasicMaterial({ color: 0xcccccc, wireframe: true, transparent: true, opacity: 0.6 }));
        net.position.set(0, goalH/2, -goalD);
        
        const posAttr = netGeo.attributes.position;
        const initialPos = []; const netVel = [];
        for (let i = 0; i < posAttr.count; i++) {
            initialPos.push(new THREE.Vector3(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i)));
            netVel.push(new THREE.Vector3(0,0,0));
        }
        group.add(net);

        group.position.set(0, 0, zPos);
        if(isRotate) group.rotation.y = Math.PI;
        scene.add(group);
        return { net: net, initialPos: initialPos, netVel: netVel, z: zPos, isRotate: isRotate };
    }

    const goalTop = createGoal(-pitchL/2, false); 
    const goalBot = createGoal(pitchL/2, true);  

    const targetRing = new THREE.Mesh(
        new THREE.RingGeometry(0.4, 0.6, 32), 
        new THREE.MeshBasicMaterial({color: 0xff0000, side: THREE.DoubleSide, transparent: true, opacity: 0.8})
    );
    targetRing.position.set(0, goalH/2, -pitchL/2 + 0.2);
    targetRing.visible = false;
    scene.add(targetRing);

    function createPlayer(shirtColor, shortColor, isGoalie = false) {
        const group = new THREE.Group();
        const sMat = new THREE.MeshStandardMaterial({ color: shirtColor });
        const shMat = new THREE.MeshStandardMaterial({ color: shortColor });
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xf1c27d });

        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.3, 0.5), sMat); torso.position.y = 1.6; torso.castShadow = true;
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), skinMat); head.position.y = 2.6; head.castShadow = true;
        const shorts = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.6, 0.55), shMat); shorts.position.y = 0.7; shorts.castShadow = true;
        
        const lArmPivot = new THREE.Group(); lArmPivot.position.set(-0.6, 2.1, 0);
        const lArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), skinMat); lArm.position.y = -0.4; lArm.castShadow = true;
        if(isGoalie) lArm.material = new THREE.MeshStandardMaterial({color: 0x333});
        lArmPivot.add(lArm);

        const rArmPivot = new THREE.Group(); rArmPivot.position.set(0.6, 2.1, 0);
        const rArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.0, 0.3), skinMat); rArm.position.y = -0.4; rArm.castShadow = true;
        if(isGoalie) rArm.material = new THREE.MeshStandardMaterial({color: 0x333});
        rArmPivot.add(rArm);

        const lLegPivot = new THREE.Group(); lLegPivot.position.set(-0.25, 0.7, 0);
        const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.9, 0.35), skinMat); lLeg.position.y = -0.4; lLeg.castShadow = true;
        lLegPivot.add(lLeg);

        const rLegPivot = new THREE.Group(); rLegPivot.position.set(0.25, 0.7, 0);
        const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.9, 0.35), skinMat); rLeg.position.y = -0.4; rLeg.castShadow = true;
        rLegPivot.add(rLeg);

        group.add(torso, head, shorts, lArmPivot, rArmPivot, lLegPivot, rLegPivot);
        group.userData = { torso: torso, lArm: lArmPivot, rArm: rArmPivot, lLeg: lLegPivot, rLeg: rLegPivot, animTime: 0, hasBall: false, shootLock: 0 };
        return group;
    }

    const player = createPlayer(0x001A6E, 0xf1c40f); player.position.set(0, 0, 15); scene.add(player); 
    const aiDefender = createPlayer(0xA50044, 0x111111); aiDefender.position.set(0, 0, -10); scene.add(aiDefender); 
    
    const aiGoalie = createPlayer(0x27ae60, 0x111111, true); aiGoalie.position.set(0, 0, -pitchL/2 + 1.5); scene.add(aiGoalie); 
    const homeGoalie = createPlayer(0x001A6E, 0xf1c40f, true); homeGoalie.position.set(0, 0, pitchL/2 - 1.5); scene.add(homeGoalie); 

    const ballRadius = 0.35;
    const ball = new THREE.Mesh(new THREE.SphereGeometry(ballRadius, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 }));
    const stripe = new THREE.Mesh(new THREE.CylinderGeometry(ballRadius+0.01, ballRadius+0.01, 0.2, 32), new THREE.MeshBasicMaterial({color: 0x111}));
    stripe.rotation.x = Math.PI/2; ball.add(stripe);
    ball.position.set(0, ballRadius, 0); ball.castShadow = true; scene.add(ball);

    const keys = { w: false, a: false, s: false, d: false, shift: false, f: false };
    let ballVel = new THREE.Vector3(0,0,0);
    const gravity = 0.015;
    
    document.addEventListener('keydown', e => {
        const k = e.key.toLowerCase(); 
        if(keys.hasOwnProperty(k)) keys[k] = true;
        
        if(e.code === 'Space' && player.userData.hasBall && !isAiming) {
            isAiming = true;
            targetRing.visible = true;
            document.getElementById('aim-warning').style.display = 'block';
            targetRing.position.set(0, goalH/2, -pitchL/2 + 0.5);
        }
        
        if(e.code === 'Space' && !player.userData.hasBall && player.userData.shootLock === 0) {
            player.userData.shootLock = 40; 
            player.userData.rLeg.rotation.x = -1.0; 
            
            const distToAi = Math.hypot(player.position.x - aiDefender.position.x, player.position.z - aiDefender.position.z);
            if(distToAi < 3.0 && aiDefender.userData.hasBall) {
                aiDefender.userData.hasBall = false;
                player.userData.hasBall = true;
                aiDefender.userData.shootLock = 60; 
            }
            
            setTimeout(() => { player.userData.rLeg.rotation.x = 0; }, 300);
        }
        
        if(k === 'e' && player.userData.hasBall && !isAiming) {
            player.userData.hasBall = false;
            player.userData.shootLock = 30;
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
            ballVel.set(dir.x * 0.4, 0.1, dir.z * 0.4);
            player.userData.rLeg.rotation.x = -0.8; 
            setTimeout(() => { player.userData.rLeg.rotation.x = 0; }, 200);
        }
    });

    document.addEventListener('keyup', e => {
        const k = e.key.toLowerCase();
        if(keys.hasOwnProperty(k)) keys[k] = false;
        
        if(e.code === 'Space') {
            if(player.userData.hasBall && isAiming) {
                executeTargetedShot(shootPower);
            }
            isAiming = false; shootPower = 0; 
            document.getElementById('power-fill').style.width = '0%';
            targetRing.visible = false;
            document.getElementById('aim-warning').style.display = 'none';
        }
    });

    function executeTargetedShot(power) {
        player.userData.hasBall = false;
        player.userData.shootLock = 30; 
        
        const distX = targetRing.position.x - ball.position.x;
        const distZ = targetRing.position.z - ball.position.z;
        const dist = Math.hypot(distX, distZ);
        
        const speed = Math.max(0.35, power / 65); 
        const time = dist / speed;
        
        const vx = distX / time;
        const vz = distZ / time;
        const dy = targetRing.position.y - ball.position.y;
        const vy = (dy + 0.5 * gravity * time * time) / time;

        ballVel.set(vx, vy, vz);
        
        player.userData.rLeg.rotation.x = -1.8; 
        player.userData.torso.rotation.x = 0.4; 
        player.userData.lArm.rotation.x = -0.8; 
        player.userData.rArm.rotation.x = 0.8;  
        
        setTimeout(() => { 
            player.userData.rLeg.rotation.x = 0; 
            player.userData.torso.rotation.x = 0;
            player.userData.lArm.rotation.x = 0;
            player.userData.rArm.rotation.x = 0;
        }, 400); 
    }

    function showGoalMessage(msgText, subText, mainColor="#00e676") {
        const msg = document.getElementById('center-msg');
        msg.style.color = mainColor;
        msg.innerHTML = `${msgText}<br><span style="font-size: 30px; color: white;">${subText}</span>`;
        msg.classList.add('show-msg');
        
        setTimeout(() => {
            msg.classList.remove('show-msg');
            ball.position.set(0, ballRadius, 0); ballVel.set(0,0,0);
            player.position.set(0, 0, 15); aiDefender.position.set(0, 0, -10); 
            aiGoalie.position.set(0, 0, -pitchL/2 + 1.5); homeGoalie.position.set(0, 0, pitchL/2 - 1.5);
            player.userData.hasBall = false; aiDefender.userData.hasBall = false;
            shootPower = 0; isAiming = false; targetRing.visible = false;
            document.getElementById('aim-warning').style.display = 'none';
            document.getElementById('power-fill').style.width = '0%';
            gameState = 'playing';
        }, 3500);
    }

    function updateNet(goalData) {
        const pos = goalData.net.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            let wx = goalData.initialPos[i].x + goalData.net.position.x;
            let wy = goalData.initialPos[i].y + goalData.net.position.y;
            let wz = goalData.initialPos[i].z + goalData.z + (goalData.isRotate ? goalD : -goalD);
            
            let dist = Math.hypot(ball.position.x - wx, ball.position.y - wy, ball.position.z - wz);
            let targetZ = goalData.initialPos[i].z;
            
            if(dist < 4.5 && (gameState === 'playing' || gameState === 'goal')) {
                let push = (4.5 - dist) * 3.5; 
                targetZ -= push; 
            }
            let currentZ = pos.getZ(i);
            
            goalData.netVel[i].z += (targetZ - currentZ) * 0.15; 
            goalData.netVel[i].z *= 0.97; 
            
            pos.setZ(i, currentZ + goalData.netVel[i].z);
        }
        pos.needsUpdate = true;
    }

    function animateCharacter(char, isMoving, speed) {
        if(isMoving) {
            char.userData.animTime += speed;
            const swing = Math.sin(char.userData.animTime) * 0.6;
            char.userData.lArm.rotation.x = swing;
            char.userData.rArm.rotation.x = -swing;
            char.userData.lLeg.rotation.x = -swing;
            char.userData.rLeg.rotation.x = swing;
        } else {
            char.userData.lArm.rotation.x *= 0.8; char.userData.rArm.rotation.x *= 0.8;
            char.userData.lLeg.rotation.x *= 0.8; char.userData.rLeg.rotation.x *= 0.8;
        }
    }

    function updateGoalie(goalie, targetZBase) {
        let targetGX = ball.position.x;
        targetGX = Math.max(-goalW/2 + 1, Math.min(goalW/2 - 1, targetGX));
        
        let targetGZ = targetZBase;
        if (Math.abs(ball.position.z - targetZBase) < 20) { 
            targetGZ = targetZBase + (targetZBase > 0 ? -3 : 3); 
        }
        
        goalie.position.x += (targetGX - goalie.position.x) * 0.05;
        goalie.position.z += (targetGZ - goalie.position.z) * 0.05;
        goalie.rotation.y = Math.atan2(ball.position.x - goalie.position.x, ball.position.z - goalie.position.z);
        
        const goalieDist = Math.hypot(goalie.position.x - ball.position.x, goalie.position.z - ball.position.z);
        if(goalieDist < 1.8 && ball.position.y < goalH && ballVel.length() > 0.15) {
            ballVel.x *= -0.4; ballVel.z *= -0.4; ballVel.y = 0.3; 
            goalie.position.x += (ball.position.x - goalie.position.x) * 0.4; 
        }
    }

    function animate() {
        requestAnimationFrame(animate);

        if(isAiming && !player.userData.hasBall) {
            isAiming = false; shootPower = 0; targetRing.visible = false;
            document.getElementById('aim-warning').style.display = 'none';
            document.getElementById('power-fill').style.width = '0%';
        }

        if(gameState === 'playing') {
            
            if (player.userData.shootLock > 0) player.userData.shootLock--;
            if (aiDefender.userData.shootLock > 0) aiDefender.userData.shootLock--;

            if (isAiming) {
                shootPower += 1.5;
                if(shootPower > 100) shootPower = 100;
                document.getElementById('power-fill').style.width = shootPower + '%';
                
                if(keys.a) targetRing.position.x -= 0.15;
                if(keys.d) targetRing.position.x += 0.15;
                if(keys.w) targetRing.position.y += 0.10; 
                if(keys.s) targetRing.position.y -= 0.10; 

                targetRing.position.x = Math.max(-goalW/2 + 0.5, Math.min(goalW/2 - 0.5, targetRing.position.x));
                targetRing.position.y = Math.max(0.3, Math.min(goalH - 0.5, targetRing.position.y));
                
                targetRing.scale.setScalar(1 + Math.sin(Date.now() * 0.01) * 0.1);
                player.rotation.y = Math.atan2(targetRing.position.x - player.position.x, targetRing.position.z - player.position.z);
                
            } else {
                let speed = 0.20;
                if(keys.shift && stamina > 0 && !keys.f) { speed = 0.35; stamina -= 0.8; } 
                else if(stamina < 100) { stamina += 0.4; }
                if(keys.f && player.userData.hasBall) speed = 0.12; 

                document.getElementById('stamina-fill').style.width = stamina + '%';

                let moveX = 0; let moveZ = 0;
                if(keys.w) moveZ -= 1; if(keys.s) moveZ += 1;
                if(keys.a) moveX -= 1; if(keys.d) moveX += 1;

                let isMoving = (moveX !== 0 || moveZ !== 0);

                if(isMoving) {
                    const angle = Math.atan2(moveX, moveZ);
                    player.rotation.y += (angle - player.rotation.y) * 0.2;
                    player.rotation.y = angle; 
                    
                    player.position.x += Math.sin(angle) * speed;
                    player.position.z += Math.cos(angle) * speed;
                    
                    player.position.x = Math.max(-pitchW/2+1, Math.min(pitchW/2-1, player.position.x));
                    player.position.z = Math.max(-pitchL/2+1, Math.min(pitchL/2-1, player.position.z));
                }
                animateCharacter(player, isMoving, speed > 0.2 ? 0.4 : 0.2);
            }

            const distToBall = Math.hypot(player.position.x - ball.position.x, player.position.z - ball.position.z);
            if(distToBall < 1.5 && ball.position.y < 1.0 && !aiDefender.userData.hasBall && player.userData.shootLock === 0) {
                player.userData.hasBall = true;
            } else if (distToBall > 2.0) {
                player.userData.hasBall = false;
            }

            if(player.userData.hasBall) {
                const offsetZ = keys.f ? 0.8 : 1.3; 
                ball.position.x = player.position.x + Math.sin(player.rotation.y) * offsetZ;
                ball.position.z = player.position.z + Math.cos(player.rotation.y) * offsetZ;
                ball.position.y = ballRadius;
                ballVel.set(0,0,0);
                if(!isAiming) ball.rotation.x -= 0.2; 
            } else {
                ball.position.add(ballVel);
                ballVel.y -= gravity; 
                ballVel.x *= 0.985; ballVel.z *= 0.985; 

                if(ball.position.y < ballRadius) {
                    ball.position.y = ballRadius;
                    ballVel.y = Math.abs(ballVel.y) * 0.65; 
                }
                ball.rotation.x += ballVel.z; ball.rotation.z -= ballVel.x;
            }

            const aiDist = Math.hypot(aiDefender.position.x - ball.position.x, aiDefender.position.z - ball.position.z);
            let aiMoving = false;

            if (aiDefender.userData.hasBall) {
                aiMoving = true;
                const targetGoalZ = pitchL/2; 
                const aiAngle = Math.atan2(0 - aiDefender.position.x, targetGoalZ - aiDefender.position.z);
                aiDefender.rotation.y = aiAngle;
                
                aiDefender.position.x += Math.sin(aiAngle) * 0.16;
                aiDefender.position.z += Math.cos(aiAngle) * 0.16;
                
                ball.position.x = aiDefender.position.x + Math.sin(aiAngle) * 1.0;
                ball.position.z = aiDefender.position.z + Math.cos(aiAngle) * 1.0;

                if (aiDefender.position.z > pitchL/4 && aiDefender.userData.shootLock === 0) {
                    aiDefender.userData.hasBall = false;
                    aiDefender.userData.shootLock = 30; 
                    ballVel.set((Math.random()-0.5)*1.2, 0.35, 1.0); 
                    aiDefender.userData.rLeg.rotation.x = -1.0; 
                    setTimeout(() => { aiDefender.userData.rLeg.rotation.x = 0; }, 300);
                }
            } else {
                if(aiDist > 1.2 && !isAiming) { 
                    aiMoving = true;
                    const aiAngle = Math.atan2(ball.position.x - aiDefender.position.x, ball.position.z - aiDefender.position.z);
                    aiDefender.rotation.y = aiAngle;
                    aiDefender.position.x += Math.sin(aiAngle) * 0.18;
                    aiDefender.position.z += Math.cos(aiAngle) * 0.18;
                } else if(!player.userData.hasBall && ball.position.y < 1 && aiDefender.userData.shootLock === 0) {
                    aiDefender.userData.hasBall = true; 
                }
            }
            animateCharacter(aiDefender, aiMoving, 0.3);

            updateGoalie(aiGoalie, -pitchL/2 + 1.5);
            updateGoalie(homeGoalie, pitchL/2 - 1.5);

            if (Math.abs(ball.position.z) > pitchL/2 && gameState === 'playing') {
                if (Math.abs(ball.position.x) < goalW/2 && ball.position.y < goalH) {
                    gameState = 'goal';
                    if(ball.position.z < 0) {
                        scoreHome++; document.getElementById('s-home').innerText = scoreHome;
                        showGoalMessage("GOOOOL!", "Ağları Deldi Geçti!", "#00e676");
                    } else {
                        scoreAway++; document.getElementById('s-away').innerText = scoreAway;
                        showGoalMessage("GOL YEDİN!", "Defans Uyudu...", "#ef4444");
                    }
                } else {
                    gameState = 'goal'; 
                    showGoalMessage("AUT!", "Şut isabetsiz...", "#facc15");
                }
            }
            
            if(Math.abs(ball.position.x) > pitchW/2 && gameState === 'playing') { 
                gameState = 'goal';
                showGoalMessage("TAÇ!", "Top oyun alanı dışında.", "#facc15");
            }
        }

        updateNet(goalTop);
        updateNet(goalBot);

        let camTargetX = ball.position.x * 0.5;
        let camTargetZ = player.position.z + 20;
        camera.position.x += (camTargetX - camera.position.x) * 0.1;
        camera.position.z += (camTargetZ - camera.position.z) * 0.1;
        camera.lookAt(ball.position.x * 0.3, 0, ball.position.z - 5);

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>

</body>
</html>
